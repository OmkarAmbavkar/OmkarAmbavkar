<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0C"/>
      <stop offset="55%" stop-color="#111214"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CBA35C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#CBA35C" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <circle cx="1040" cy="60" r="180" fill="url(#blob)" filter="url(#soft)"/>
  <circle cx="120" cy="240" r="140" fill="url(#blob)" filter="url(#soft)" opacity="0.6"/>

  <!-- corner brackets -->
  <g stroke="#CBA35C" stroke-width="1">
    <path d="M28,26 H54 M28,26 V52" fill="none"/>
    <path d="M1172,26 H1146 M1172,26 V52" fill="none"/>
    <path d="M28,254 H54 M28,254 V228" fill="none"/>
    <path d="M1172,254 H1146 M1172,254 V228" fill="none"/>
  </g>

  <!-- eyebrow -->
  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="11" letter-spacing="4" fill="#8B8A90">
    <rect x="60" y="52" width="28" height="1" fill="#CBA35C"/>
    <text x="98" y="57">AI &amp; AUTOMATION ENGINEER — MUMBAI, INDIA</text>
  </g>

  <!-- name -->
  <text x="58" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="72" letter-spacing="-2" fill="#F5F3EE">OMKAR</text>
  <text x="58" y="222" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="72" letter-spacing="-2" fill="none" stroke="#57565C" stroke-width="1.1">AMBAVKAR</text>

  <!-- blinking cursor -->
  <rect x="565" y="192" width="10" height="46" fill="#CBA35C">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- animated underline -->
  <line x1="58" y1="250" x2="360" y2="250" stroke="#CBA35C" stroke-width="1" stroke-dasharray="302" stroke-dashoffset="302">
    <animate attributeName="stroke-dashoffset" from="302" to="0" dur="1.6s" fill="freeze" begin="0.3s"/>
  </line>

  <text x="820" y="240" font-family="'JetBrains Mono', Consolas, monospace" font-size="11" letter-spacing="2" fill="#57565C" text-anchor="end">SIEMENS · PYTHON · REACT · AZURE OPENAI · n8n</text>
</svg>
